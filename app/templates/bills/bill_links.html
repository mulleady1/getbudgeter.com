<div id="bill-links-container" {% if edit_mode %}data-edit-mode="true"{% endif %}>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 0.5rem;">
    <h3 style="margin: 0; font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;">Other accounts</h3>
    <wa-dropdown placement="bottom-end">
      <wa-button slot="trigger" variant="neutral" appearance="plain"
        ><wa-icon name="ellipsis-vertical"></wa-icon
      ></wa-button>

      <wa-dropdown-item>
        <script>
          me().on("click", () => {
            var el = me("#bill-links-container")
            var editMode = el.attr("data-edit-mode") === "true"
            el.attr("data-edit-mode", !editMode)
          })
        </script>
        <wa-icon slot="icon" name="pencil"></wa-icon>
        Toggle edit mode
      </wa-dropdown-item>
    </wa-dropdown>
  </div>
  {% if links %}
    <ul style="list-style: none; padding: 0; margin: 0 0 10px 0;">
      {% for link in links %}
        {% partialdef bill-link-item inline %}
          <li style="margin: 0; display: flex; align-items: center; gap: 8px;">
            <div class="reorder-buttons" style="flex-direction: column;">
              <button
                class="reorder-btn"
                hx-post="/bills/links/{{ link.id }}/reorder/up"
                hx-target="#bill-links-container"
                hx-swap="outerHTML"
                {% if forloop.first %}disabled{% endif %}
              >
                <wa-icon name="chevron-up"></wa-icon>
              </button>
              <button
                class="reorder-btn"
                hx-post="/bills/links/{{ link.id }}/reorder/down"
                hx-target="#bill-links-container"
                hx-swap="outerHTML"
                {% if forloop.last %}disabled{% endif %}
              >
                <wa-icon name="chevron-down"></wa-icon>
              </button>
            </div>
            <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer"> {{ link.label }} </a>
            <div class="edit-actions">
              <wa-button
                size="small"
                appearance="plain"
                hx-get="/bills/links/{{ link.id }}"
                hx-target="body"
                hx-swap="beforeend"
              >
                <wa-icon name="pencil" label="Edit"></wa-icon>
              </wa-button>
              <wa-button
                size="small"
                appearance="plain"
                variant="danger"
                hx-delete="/bills/links/{{ link.id }}"
                hx-trigger="confirmed"
                hx-target="#bill-links-container"
                hx-swap="outerHTML"
                onclick="customConfirm().then(yes => { if (yes) { htmx.trigger(this, 'confirmed'); } })"
              >
                <wa-icon name="trash" label="Delete"></wa-icon>
              </wa-button>
            </div>
          </li>
        {% endpartialdef bill-link-item %}
      {% endfor %}
    </ul>
  {% else %}
    <div style="color: #888; font-size: 0.9rem; margin-bottom: 10px;">No data.</div>
  {% endif %}

  <a hx-get="/bills/links/new" hx-target="body" hx-swap="beforeend"> New... </a>
</div>
