<wa-drawer
  {% if budget.id %}
    label="Edit Budget"
  {% else %}
    label="Add Budget"
  {% endif %}
>
  <form
    id="budget-form"
    {% if budget.id %}
      hx-put="/budgets/{{ budget.id }}"
    {% else %}
      hx-post="/budgets"
    {% endif %}
    hx-target="#budget-list"
    hx-swap="outerHTML"
    style="display: flex; flex-direction: column; gap: 1rem;"
  >
    {% csrf_token %}

    <div>
      <label for="category" style="display: block; font-weight: 500;">Category</label>
      <select id="category" name="category" required {% if budget.id %}disabled{% endif %} style="width: 100%;">
        <option value="">Select category...</option>
        {% for category in categories %}
          <option value="{{ category.id }}" {% if budget.category_id == category.id %}selected{% endif %}>
            {{ category.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <wa-input
      label="Budget Amount"
      type="number"
      name="amount"
      step="1"
      min="0"
      required
      {% if budget %}value="{{ budget.amount }}"{% endif %}
      style="width: 100%;"
    ></wa-input>

  </form>

  <div slot="footer" style="width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
    <wa-button
      appearance="outlined"
      onclick="this.closest('wa-drawer').open = false"
      style="margin-top: 1rem; width: 100%;"
    >
      Cancel
    </wa-button>
    <wa-button type="submit" form="budget-form" style="margin-top: 1rem; width: 100%;">Save</wa-button>
  </div>
</wa-drawer>
