{% load static %}

<div class="trend-chart-section">
  <div class="chart-filter" style="display: flex; align-items: center; justify-content: space-between;">
    <wa-select
      name="category"
      size="small"
      value="{{ selected_category }}"
    >
      <script>
        me().on('change', (e) => {
          const form = me('#date-range-form')
          const formData = new FormData(form)
          const category = e.target.value

          // Update merchant chart dropdown to match
          const merchantSelect = me('#merchant-chart-container wa-select')
          if (merchantSelect) {
            merchantSelect.value = category
          }

          // Build query string from form data
          const params = new URLSearchParams(formData)
          params.set('category', category)

          // Trigger HTMX requests for both charts
          htmx.ajax('GET', `/analytics/trend-chart?${params.toString()}`, {
            target: '#trend-chart-container',
            swap: 'innerHTML'
          })
          htmx.ajax('GET', `/analytics/merchant-chart?${params.toString()}`, {
            target: '#merchant-chart-container',
            swap: 'innerHTML'
          })
        })
      </script>
      <wa-option value="all">All Categories</wa-option>
      {% for category in categories %}
        <wa-option value="{{ category.id }}">{{ category.name }}</wa-option>
      {% endfor %}
    </wa-select>
    <wa-button size="small" appearance="plain" id="trend-see-more-btn">
      <script>
        me().on('click', () => {
          const form = document.querySelector('#date-range-form')
          const formData = new FormData(form)
          const mode = formData.get('mode') || 'month'

          let startDate, endDate

          if (mode === 'month') {
            const monthVal = formData.get('month') || ''
            if (monthVal) {
              const [y, m] = monthVal.split('-').map(Number)
              const lastDay = new Date(y, m, 0).getDate()
              startDate = `${y}-${String(m).padStart(2, '0')}-01`
              endDate = `${y}-${String(m).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`
            }
          } else if (mode === 'year') {
            const year = formData.get('year') || ''
            if (year) {
              startDate = `${year}-01-01`
              endDate = `${year}-12-31`
            }
          } else {
            startDate = formData.get('start_date') || ''
            endDate = formData.get('end_date') || ''
          }

          const params = new URLSearchParams()
          if (startDate) params.set('start_date', startDate)
          if (endDate) params.set('end_date', endDate)
          if (startDate && endDate) params.set('date_mode', 'range')

          const categorySelect = document.querySelector('#trend-chart-container wa-select')
          const categoryVal = categorySelect?.value
          if (categoryVal && categoryVal !== 'all') params.set('category', categoryVal)

          window.open(`/transactions?${params.toString()}`, '_blank')
        })
      </script>
      View details
      <wa-icon slot="end" name="arrow-up-right-from-square"></wa-icon>
    </wa-button>
  </div>

  {% if trend_chart_data %}
    <div class="chart-container">
      <canvas id="trend-chart"></canvas>
      <script>
        // Delay chart initialization to ensure canvas is properly sized
        function createTrendChart() {
          // Destroy existing chart if it exists
          const existingChart = Chart.getChart('trend-chart')
          if (existingChart) {
            existingChart.destroy()
          }

          const trendData = {{ trend_chart_data|safe }}
          const canvas = me('#trend-chart')
          const trendCtx = canvas.getContext('2d')
          new Chart(trendCtx, {
            type: 'line',
            data: {
              labels: trendData.labels,
              datasets: [{
                label: 'Spending',
                data: trendData.data,
                borderColor: '#36A2EB',
                backgroundColor: 'rgba(54, 162, 235, 0.1)',
                borderWidth: 3,
                tension: 0.1,
                fill: true
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                title: {
                  display: true,
                  text: 'Spending Trend',
                  font: { size: 16 }
                },
                legend: {
                  display: false
                },
                tooltip: {
                  callbacks: {
                    label: (context) => '$' + context.parsed.y.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                  }
                }
              },
              scales: {
                y: {
                  beginAtZero: true
                },
                x: {
                }
              }
            }
          })
        }

        waitFor(() => typeof window.Chart !== 'undefined').then(() => createTrendChart())
      </script>
    </div>
  {% else %}
    <p class="empty-state">No trend data available.</p>
  {% endif %}
</div>
