<wa-drawer label="Upload Receipt" class="receipt-upload-dialog" {% if not is_mobile %}style="--size: 50vw;"{% endif %}>
  <form
    id="receipt-upload-form"
    hx-post="/receipts/upload"
    hx-target="body"
    hx-swap="beforeend"
    hx-encoding="multipart/form-data"
  >
    {% csrf_token %}

    {% partialdef error %}
      <wa-callout variant="danger" open style="margin-bottom: 1rem;">
        <wa-icon slot="icon" name="circle-exclamation"></wa-icon>
        {{ error }}
      </wa-callout>
    {% endpartialdef error %}

    <div style="margin-bottom: 1.5rem;">
      <label for="receipt_image" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Receipt Image</label>
      <input
        type="file"
        id="receipt_image"
        name="receipt_image"
        accept="image/*"
        required
        style="display: block; width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;"
      />
      <script>
        me("#receipt_image").on("change", function (e) {
          const file = e.target.files[0]
          const warning = me("#file-size-warning")
          const submitBtn = me('.receipt-upload-dialog [type="submit"]')
          if (file && file.size > 5 * 1024 * 1024) {
            if (!warning) {
              const el = document.createElement("p")
              el.id = "file-size-warning"
              el.style.cssText = "font-size: 0.875rem; color: red; margin-top: 0.25rem;"
              el.textContent = `File is ${(file.size / 1024 / 1024).toFixed(1)}MB — please choose an image under 5MB.`
              e.target.after(el)
            }
            submitBtn.disabled = true
          } else {
            if (warning) warning.remove()
            submitBtn.disabled = false
          }
        })
      </script>
      <p style="font-size: 0.875rem; color: #666; margin-top: 0.5rem;">
        Supported formats: JPG, PNG, GIF, BMP, TIFF (max 5MB)
      </p>
      <p style="font-size: 0.875rem; color: #666; margin-top: 0.25rem;">
        Take a photo or choose from your library. The receipt will be automatically processed to extract merchant, date,
        and items.
      </p>
    </div>
  </form>

  <div slot="footer" style="display: flex; gap: 0.5rem; justify-content: flex-end;">
    <wa-button type="button" appearance="outlined" onclick="this.closest('wa-drawer').open = false">Cancel</wa-button>
    <wa-button form="receipt-upload-form" type="submit" variant="primary">
      <wa-icon slot="start" name="upload"></wa-icon>
      Upload
    </wa-button>
  </div>
</wa-drawer>
